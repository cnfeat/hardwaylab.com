# 笨方法实验室 — Just the Docs 站点配置

title: 笨方法实验室
description: 世上无难事，只怕笨方法。为 1% 的实现可能而做长期努力，成为可能自我。
baseurl: ""
url: "https://hardwaylab.com"

# 社交媒体分享配置
github:
  repository: https://github.com/cnfeat/hardwaylab.com
  branch: main

twitter:
  username: "@feat"

og_image: /images/hardwaybook.png

# Google Analytics
google_analytics: G-EX4S136MJJ

# 主题
theme: just-the-docs

# 网站图标
favicon_ico: "/favicon.ico"

# 生成 pretty URL（/course/writing/ 而非 /course/writing.html）
permalink: pretty

# 全局默认布局（关键：确保所有页面套用 Just the Docs 主题框架）
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# ---------- 搜索 ----------
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  rel_url: true
  button: false
  focus_shortcut_key: "k"

# ---------- 导航 ----------
# 页面标题旁的锚点链接
heading_anchors: true

# 回到顶部
back_to_top: true
back_to_top_text: "回到顶部"

# 右上角辅助链接
aux_links:
  "卡片创作实验室":
    - "https://cnfeat.com"
aux_links_new_tab: true

# ---------- 配色 ----------
# 可选: nil (浅色/默认), "dark" (深色)
color_scheme: nil

# ---------- Callout 组件 ----------
callouts:
  warning:
    title: 注意
    color: red
  note:
    title: 提示
    color: purple
  highlight:
    color: yellow

# ---------- Footer ----------
footer_content: "遵循 CC BY-NC 4.0 协议 · 版权所有 © 笨方法实验室"
footer_links_enabled: false

# ---------- 插件 ----------
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# ---------- Markdown 引擎 ----------
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ---------- Liquid ----------
liquid:
  error_mode: strict
  strict_filters: true

# ---------- HTML 压缩 ----------
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

# ---------- Sass ----------
sass:
  quiet_deps: true
  silence_deprecations: ['import']

# ---------- 排除文件 ----------
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .sass-cache/
  - .jekyll-cache/
  - vendor/
